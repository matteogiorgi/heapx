name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: Build, Test, And Smoke Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          gcc --version
          make --version

      - name: Run CI checks
        run: make ci

      - name: Check whitespace
        run: git diff --check
