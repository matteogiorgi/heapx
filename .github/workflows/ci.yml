name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: Build, Test, And Smoke Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          gcc --version
          make --version

      - name: Build library
        run: make

      - name: Run tests
        run: make test

      - name: Run sanitizer tests
        run: make sanitize

      - name: Run internal invariant debug checks
        run: make debug-checks

      - name: Run Dijkstra benchmark smoke test
        run: make benchmark-smoke

      - name: Run heap benchmark smoke test
        run: make benchmark-heap-smoke

      - name: Check whitespace
        run: git diff --check
